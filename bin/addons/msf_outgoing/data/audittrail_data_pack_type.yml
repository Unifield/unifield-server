-
  For a Pack Type, rule for the CREATE/WRITE of objects with the list of fields to track
-
  !python {model: audittrail.rule}: |
    name = 'PACK TYPE CREATE/WRITE'
    object_ids = self.pool.get('ir.model').search(cr, uid, [('model', '=', 'pack.type')], context=context)
    rule_id = self.search(cr, uid, [('name', '=', name)], context=context)
    if object_ids:
        # Create the rule
        fields = ['name', 'width', 'length', 'height']
        fields_ids = self.pool.get('ir.model.fields').search(cr, uid, [('model', '=', 'pack.type'), ('name', 'in', fields)], context=context)
        vals = {'name': name,
                'object_id': object_ids[0],
                'log_create': True,
                'log_write': True,
                'log_unlink': False,
                'field_ids': [(6, 0, fields_ids)],
               }
        if not rule_id:
            rule_id = self.create(cr, uid, vals, context=context)
        elif rule_id:
            self.write(cr, uid, rule_id, vals, context=context)
        # Subscribe to the rule
        self.subscribe(cr, uid, rule_id)
