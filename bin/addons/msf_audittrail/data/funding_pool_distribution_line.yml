-
  For FP distribution lines, track the creation, modification, and deletion
-
  !python {model: audittrail.rule}: |
    name = 'AD line'
    object_ids = self.pool.get('ir.model').search(cr, uid, [('model', '=', 'funding.pool.distribution.line')], context=context)
    rule_id = self.search(cr, uid, [('object_id', 'in', object_ids)], context=context)
    if object_ids:
        fields = ['cost_center_id', 'destination_id', 'analytic_id', 'percentage']

        fields_ids = self.pool.get('ir.model.fields').search(cr, uid, [('model', '=', 'funding.pool.distribution.line'), ('name', 'in', fields)], context=context)

        vals = {
            'name': name,
            'object_id': object_ids[0],
            'log_write': True,
            'log_unlink': True,
            'log_create': True,
            'field_ids': [(6, 0, fields_ids)],
            'domain_filter': [('track_changes_ok', '=', True)],
        }

        if not rule_id:
            rule_id = self.create(cr, uid, vals, context=context)
        elif rule_id:
            self.write(cr, uid, rule_id, vals, context=context)
        # Subscribe to the rule
        self.subscribe(cr, uid, rule_id)
